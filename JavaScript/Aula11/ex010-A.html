 <!DOCTYPE html>
 <html lang="pt-BR">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio Pais</title>
 </head>
 <body>
    <h1>Digite a sua nacionalidade</h1>
   <input type="text" name="txtpais" id="txtpais">
    <input type="button" value="verificar" onclick="verificar()">
    <div id="res"></div>
    <script>
        function verificar(){
            var pais = window.document.getElementById('txtpais')
            var resp = window.document.querySelector('div#res')
            if(pais.value == "Brasil"){
                resp.innerHTML='Voce é brasileiro'

            }else{
                resp.innerHTML=`Voce é extrangeiro`
            }
        }


    </script>
 </body>
 </html>
