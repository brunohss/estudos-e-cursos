<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            font: normal 20pt Arial;
        }

    </style>
</head>
<body>
    
    <script>
        var nome = window.prompt('Qual o seu nome')
        var n1 = window.prompt('digite o valor')
        n1.toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'})
        document.write(`Seu nome <strong>${nome}</strong> tem ${nome.length} letras.<br/>`)
        document.write(`Seu nome maiusculo é :  ${nome.toUpperCase()}.<br/>`)
        document.write(`Seu nome minusculo é :  ${nome.toLowerCase()}.<br/>`)
        document.write(`Seu Salario é :  ${n1}.<br/>`)
    </script>

</body>
</html>
