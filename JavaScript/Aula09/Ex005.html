<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Primeiros Passos com DOM</title>
    <style>
    body{
        background-color: rgb(144, 144, 244);
        font-size: large;


    }</style>
</head>
<body>
    <h1>Primeiros Passos com Dom</h1>
    <p>Aqui vai o resultado</p>
    <p>Aprendendo a <strong>com DOM</strong> facil </p>
    <div>Clique em mim</div>
    
    <script>
    var p1 = window.document.getElementsByTagName('p')[1]
    var fundo = window.document.body
    window.document.write('Esta escrito assim : ' + p1.innerText)
    fundo.style.background = 'gray'
    p1.style.color = 'blue'
    window.document.write(p1.innerHTML)
    window.alert(p1.innerText)
    </script>
</body>
</html>
